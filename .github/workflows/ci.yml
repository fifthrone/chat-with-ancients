name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cwa_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=20

    env:
      CHAT_SESSION_SECRET: ci-chat-session-secret-minimum-32-characters
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/cwa_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format check)
        run: pnpm lint

      - name: Prisma generate (db package)
        run: pnpm --filter @chat-with-ancients/db db:generate

      - name: Prisma migrate deploy (verify migrations)
        run: pnpm db:migrate:deploy

      - name: API typecheck
        run: pnpm --filter @chat-with-ancients/api typecheck

      - name: API tests
        run: pnpm --filter @chat-with-ancients/api test:run

      - name: Mobile typecheck
        run: pnpm typecheck:mobile

      - name: Mobile unit tests
        run: pnpm test:mobile

      - name: Expo web export (smoke)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: https://example.com
          EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: pk.placeholder
        run: npx expo export --platform web

      - name: Docker build API image (smoke)
        run: docker build -f apps/api/Dockerfile .

  deploy-web:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export Expo web
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.API_URL }}
          EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: npx expo export --platform web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
