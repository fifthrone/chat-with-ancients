name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate (db package)
        run: pnpm --filter @chat-with-ancients/db db:generate

      - name: API typecheck
        run: pnpm --filter @chat-with-ancients/api typecheck

      - name: API tests
        run: pnpm --filter @chat-with-ancients/api test:run

      - name: Expo web export (smoke)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: https://example.com
          EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: pk.placeholder
        run: npx expo export --platform web
